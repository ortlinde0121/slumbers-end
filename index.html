<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沉眠的终结 | Slumber's End</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a; color: #cbcbcb;
            font-family: "Noto Serif SC", "SimSun", serif;
            min-height: 100vh; display: flex; justify-content: center;
            align-items: center; line-height: 2; padding: 20px;
        }
        #game-container {
            max-width: 680px; width: 100%; background: #121212;
            border: 1px solid #2a2a2a; border-radius: 4px;
            padding: 40px 36px; min-height: 480px; position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            max-height: 90vh; overflow-y: auto;
        }
        #text-area { min-height: 300px; white-space: pre-wrap; }
        #text-area p { margin-bottom: 16px; animation: fadeIn 0.6s ease-out; }
        .ng-plus {
            color: #b08080; font-style: italic;
            border-left: 2px solid #5a3a3a; padding-left: 12px;
            animation: fadeIn 1.2s ease-out;
        }
        .artifact-title {
            color: #8a7a6a; letter-spacing: 2px; font-size: 13px;
            border-bottom: 1px solid #3a3a3a; padding-bottom: 8px; margin-bottom: 16px;
        }
        .artifact-body { color: #b0a090; font-style: italic; }
        .fragment-body { color: #b0a090; white-space: pre-wrap; }
        .letter-salutation { color: #c0b0a0; margin-bottom: 16px; }
        .letter-body {
            color: #c0b0a0; white-space: pre-wrap;
            text-indent: 2em; line-height: 2.2;
        }
        .letter-signature { text-align: right; color: #c0b0a0; margin-top: 24px; white-space: pre-wrap; }
        .awakening { color: #c0c0c0; font-style: italic; text-align: center; margin-top: 24px; white-space: pre-wrap; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #choices-area { margin-top: 28px; display: flex; flex-direction: column; gap: 8px; }
        #choices-area button {
            background: transparent; border: 1px solid #4a4a4a; color: #cbcbcb;
            padding: 10px 16px; text-align: left; font-size: 14px;
            font-family: inherit; cursor: pointer; border-radius: 2px;
            transition: all 0.2s; line-height: 1.6;
        }
        #choices-area button:hover {
            background: #2a1a1a; border-color: #8b3a3a; color: #e0d0d0; padding-left: 20px;
        }
        #choices-area button:active { background: #3a1a1a; }
        #choices-area button.small-btn { font-size: 12px; padding: 6px 12px; }
        #choices-area button.fragment-btn { border-color: #5a4a3a; color: #b0a080; }
        #choices-area button.fragment-btn:hover { border-color: #a08060; color: #d0c0a0; background: #1a1a10; }
        #choices-area button.deep-btn { border-color: #6a5a4a; color: #b0a080; }
        #choices-area button.deep-btn:hover { border-color: #a08060; color: #d0c0a0; background: #1a1a10; }
        #continue-hint {
            text-align: center; margin-top: 28px; color: #555;
            font-size: 13px; cursor: pointer; user-select: none;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
        #title-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            z-index: 10; cursor: pointer; transition: opacity 0.8s;
        }
        #title-overlay h1 { font-size: 22px; font-weight: normal; letter-spacing: 4px; color: #b0b0b0; margin-bottom: 4px; }
        #title-overlay .subtitle { font-size: 12px; color: #555; letter-spacing: 3px; font-style: italic; margin-bottom: 20px; }
        #title-overlay .title-hint { font-size: 13px; color: #555; letter-spacing: 2px; margin-bottom: 20px; }
        #title-overlay .memory-btn {
            background: transparent; border: 1px solid #4a3a3a; color: #8a7a6a;
            padding: 8px 20px; font-size: 13px; font-family: inherit;
            cursor: pointer; letter-spacing: 3px; transition: all 0.2s; margin-top: 8px;
        }
        #title-overlay .memory-btn:hover { border-color: #8a6a4a; color: #c0a080; }
        .divider { text-align: center; color: #444; margin: 20px 0; letter-spacing: 6px; font-size: 12px; }
        #ng-badge { position: fixed; top: 16px; right: 24px; color: #5a3a3a; font-size: 11px; letter-spacing: 2px; z-index: 5; display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="title-overlay">
        <h1>沉眠的终结</h1>
        <p class="subtitle">Slumber's End</p>
        <p class="title-hint" id="start-hint">点击任意位置开始</p>
        <button class="memory-btn" id="memory-btn" style="display:none;">记忆碎片</button>
    </div>
    <div id="text-area"></div>
    <div id="choices-area"></div>
    <div id="continue-hint" style="display:none;">▼ 点击继续</div>
</div>

<div id="ng-badge">二周目</div>

<script>
(function(){
var textArea = document.getElementById('text-area');
var choicesArea = document.getElementById('choices-area');
var continueHint = document.getElementById('continue-hint');
var titleOverlay = document.getElementById('title-overlay');
var memoryBtn = document.getElementById('memory-btn');
var startHint = document.getElementById('start-hint');
var ngBadge = document.getElementById('ng-badge');

var curIdx = 0, curChunk = [], cb = null, curNgArr = null;
var isNG = localStorage.getItem('somnus_ngplus')==='true';
if(isNG) ngBadge.style.display='block';

var allRoutes = ['A','B1','B2','C1','C2','D'];
var routeNames = {
    'A':'A. 直接质问', 'B1':'B1. 用力推开', 'B2':'B2. 妥协抱住',
    'C1':'C1. 继续装傻', 'C2':'C2. 崩溃大哭', 'D':'D. 尝一口'
};
var routeBranch = {A:'A', B1:'B', B2:'B', C1:'C', C2:'C', D:'D'};
var routeEnding = {
    'A':'未完成的质问', 'B1':'困兽的怀抱', 'B2':'困兽的怀抱',
    'C1':'温柔的囚笼', 'C2':'温柔的囚笼', 'D':'镜像'
};

// ==================== 实物文本 ====================
var artifacts = {
    'A': {title:'一张压在沙发垫下的泛黄收据', body:'"全息沉浸式景观模拟器V3.0。备注：请务必拆除所有外部物理锁扣，确保从内部无法强制断电。"'},
    'B1':{title:'一本边缘磨损的旧日记', body:'"今天，那双眼睛看着门外发呆了很久。如果我表现得再痛一点，再可怜一点，那道目光是不是就会重新落回我身上？"'},
    'B2':{title:'冲锋衣内侧口袋里的一张便签', body:'"今天那个主动的拥抱，持续了十三秒。比上个月多了一秒。只要我继续流血，这份依赖就会一直属于我。"'},
    'C1':{title:'医药箱底部的进货清单', body:'"医用纱布100卷，生理盐水50瓶。备注：包扎的手法越来越熟练了，下次可以试着\'伤\'在离心脏更近的地方。"'},
    'C2':{title:'一张揉碎的废弃草稿纸', body:'"如果谎言被发现了，如果眼泪掉下来了……没关系，我有足够的时间和耐心，去重塑这个只有我们两个人的世界。"'},
    'D': {title:'糖浆瓶上被撕掉一半的标签', body:'"特级食用糖浆（草莓风味）。从小就怕苦的人，如果一定要见血，至少尝到的该是甜味。"'}
};

// ==================== 碎片文本（按路线对应） ====================
var fragmentsByRoute = {
    'A': '碎片5：那面伪装成窗景的全息投影墙，是我亲手安装的。每次看着那双眼睛充满恐惧地望向窗外，我的心脏就像被狠狠攥紧。但我不敢关掉它。我怕光亮照进来，怕外面车水马龙的街道暴露无遗，怕那个残忍的真相被发现……我才是那个亲手打造地狱的怪物。',
    'B1':'碎片4：某人睡着的时候总是很安静。我习惯坐在床边，借着全息投影的微光，在心里默数那平稳的呼吸声。有时候我会忍不住想，如果这场梦永远不醒该多好。只要这孩子还在我触手可及的地方，哪怕世界真的毁灭了，我也无所谓。',
    'B2':'碎片2：每次"重伤"回家前，我都会在玄关的镜子前检查很久。糖浆的颜色够不够深？衣服破损的角度对不对？我必须做到完美无缺，因为那是换取那个拥抱的唯一筹码。',
    'C1':'碎片1：末日爆发的那天，我在门外站了整整两个小时。我把红酒倒在身上，用刀划破衣服，练习着最虚弱的呼吸频率。推开门的那一刻，我其实比门里的人还要害怕——怕谎言被识破，更怕换不来那份心疼。',
    'C2':'碎片6：我不敢想象失去这一切的样子。哪怕只是脑海里闪过离别的念头，都会让我嫉妒得发疯。我用谎言筑起了一座温室，把最珍视的人养在里面。我早就没有退路了，我只能一直骗下去，直到死亡降临。',
    'D': '碎片3：调配那些"血浆"的时候，我特意选了最甜的草莓糖浆。在连干净的水都成了奢望的"末日"里，这简直是个致命的破绽。但我控制不住……如果一定要见血，我舍不得让那张嘴尝到一丝一毫的苦涩。'
};

// 全收集后深层记忆（去碎片标签）
var deepMemoryFragments = [
    fragmentsByRoute['C1'].replace('碎片1：',''),
    fragmentsByRoute['B2'].replace('碎片2：',''),
    fragmentsByRoute['D'].replace('碎片3：',''),
    fragmentsByRoute['B1'].replace('碎片4：',''),
    fragmentsByRoute['A'].replace('碎片5：',''),
    fragmentsByRoute['C2'].replace('碎片6：','')
];

// ==================== 信 ====================
var letterSalutation = '亲爱的你：';
var letterBodyParagraphs = [
    '见字如晤。',
    '当你看到这封信的时候，也许所有的秘密都已经藏不住了。',
    '对不起，我骗了你。外面没有丧尸，没有末日，世界依然在照常运转。唯一坏掉的，只有我。',
    '还记得三年前吗？你总是看着窗外，说着想去更远的地方，想认识更多的人。每次听到那些话，我都会整夜整夜地睡不着。我看着你像一只即将振翅的鸟，而我只是一个只能站在原地仰望的可悲影子。',
    '我生病了，病得很重。这种病叫作"不能没有你"。',
    '所以我自私地关上了门，拉上了窗帘，编造了一个可怕的废土。我用谎言，换来了你全心全意的依赖。看着你每天为我担惊受怕，看着你只对我一个人笑，我知道这很卑劣，但我真的……太幸福了。',
    '我从未想过伤害你，我只是想把你藏起来，藏在一个只有我能看到的地方。',
    '我不奢求原谅。如果觉得恨，就尽情地恨我吧。但请你相信，这三年来，除了那个荒谬的末日，我对你的每一分心疼、每一次拥抱、每一句"我爱你"，都是真的。',
    '我用尽了所有的力气去爱你，哪怕这份爱已经扭曲成了牢笼。'
];
var letterSignature = '有罪的、真诚的、亲爱的\n哥哥。';

// ==================== 觉醒 ====================
var theAwakening = '我放下信纸，安静地看着窗外那片虚假的、灰蒙蒙的天空。\n原来，这三年来被困在笼子里的，从来都不只我一个。\n谎言建起了一座避难所，而我留在这里，成了这座牢笼里唯一的救赎。';

function clr(){ textArea.innerHTML=''; }
function ap(t,ng){
    var p=document.createElement('p');
    p.textContent=t;
    if(ng) p.className='ng-plus';
    textArea.appendChild(p);
    textArea.scrollTop=textArea.scrollHeight;
}
function apClass(t,cls){
    var p=document.createElement('p');
    p.textContent=t;
    if(cls) p.className=cls;
    textArea.appendChild(p);
    textArea.scrollTop=textArea.scrollHeight;
}
function ad(){
    var d=document.createElement('div');
    d.className='divider'; d.textContent='· · ·';
    textArea.appendChild(d);
    textArea.scrollTop=textArea.scrollHeight;
}
function hc(){ choicesArea.innerHTML=''; }
function sc(o){
    choicesArea.innerHTML='';
    o.forEach(function(x){
        var b=document.createElement('button');
        b.textContent=x.label;
        if(x.cls) b.className=x.cls;
        b.addEventListener('click',x.action);
        choicesArea.appendChild(b);
    });
}
function sh(cb){
    continueHint.style.display='block';
    continueHint.textContent = isNG ? '▼ 点击继续（快速模式）' : '▼ 点击继续';
    continueHint.onclick=function(){ continueHint.style.display='none'; if(cb) cb(); };
}
function hh(){ continueHint.style.display='none'; }

function getUnlocked(){ return JSON.parse(localStorage.getItem('somnus_routes')||'[]'); }
function unlockRoute(id){
    var routes = getUnlocked();
    if(routes.indexOf(id)===-1){
        routes.push(id);
        localStorage.setItem('somnus_routes',JSON.stringify(routes));
    }
}
function isUnlocked(id){ return getUnlocked().indexOf(id)!==-1; }
function allUnlocked(){ return allRoutes.every(function(r){ return isUnlocked(r); }); }
function markNG(){ if(!isNG){ isNG=true; localStorage.setItem('somnus_ngplus','true'); ngBadge.style.display='block'; } }

// ==================== 播放逻辑 ====================
function playChunk(arr, callback, ngArr){
    hc(); hh();
    if(isNG){
        clr();
        for(var i=0;i<arr.length;i++){
            if(arr[i]==='---'){ ad(); }
            else { ap(arr[i]); }
            if(ngArr && ngArr[i]){ ap(ngArr[i], true); }
        }
        sh(function(){ if(callback) callback(); });
    } else {
        curChunk=arr; curIdx=0; cb=callback||null; curNgArr=ngArr||null;
        nx();
    }
}
function nx(){
    if(curIdx<curChunk.length){
        var item=curChunk[curIdx];
        var ngItem=(curNgArr && curNgArr[curIdx])?curNgArr[curIdx]:null;
        curIdx++;
        if(item==='---'){ ad(); if(ngItem) ap(ngItem,true); }
        else { ap(item); if(ngItem) ap(ngItem,true); }
        sh(function(){ nx(); });
    } else {
        hh(); if(cb){ var c=cb; cb=null; c(); }
    }
}

// ==================== 路线图 ====================
function buildRouteMapText(){
    var lines = [];
    lines.push('▸ 发现假血\n');
    var topRoutes = ['A','B','C','D'];
    var topLabels = {A:'直接质问', B:'沉默后退', C:'假装没发现', D:'尝一口'};
    topRoutes.forEach(function(r){
        var marker = '○';
        if(r==='A' && isUnlocked('A')) marker='●';
        if(r==='B' && (isUnlocked('B1')||isUnlocked('B2'))) marker='●';
        if(r==='C' && (isUnlocked('C1')||isUnlocked('C2'))) marker='●';
        if(r==='D' && isUnlocked('D')) marker='●';
        lines.push('  '+marker+' '+r+'. '+topLabels[r]+' → '+routeEnding[r]);
        if(r==='B'){
            ['B1','B2'].forEach(function(sub){
                var sm = isUnlocked(sub) ? '●' : '○';
                lines.push('     '+sm+' '+routeNames[sub]+' → '+routeEnding[sub]);
            });
        }
        if(r==='C'){
            ['C1','C2'].forEach(function(sub){
                var sm = isUnlocked(sub) ? '●' : '○';
                lines.push('     '+sm+' '+routeNames[sub]+' → '+routeEnding[sub]);
            });
        }
    });
    lines.push('');
    lines.push('已收集：'+getUnlocked().length+' / 6');
    if(allUnlocked()){
        lines.push('');
        lines.push('◆ 全部碎片已收集 ◆');
    }
    return lines.join('\n');
}

// ==================== 显示实物 → 碎片 ====================
function showArtifact(routeId){
    hh(); hc(); clr();
    titleOverlay.style.display = 'none';
    var art = artifacts[routeId];
    apClass('实物：' + art.title, 'artifact-title');
    apClass(art.body, 'artifact-body');
    ad();
    sc([
        {
            label: '翻开碎片 →',
            cls: 'fragment-btn',
            action: function(){ showFragment(routeId); }
        },
        {
            label: '← 返回路线图',
            action: function(){ showRouteMap(); }
        }
    ]);
}

function showFragment(routeId){
    hc(); clr();
    apClass('碎片', 'artifact-title');
    apClass(fragmentsByRoute[routeId], 'fragment-body');
    ad();
    sc([{label:'← 返回路线图',action:function(){showRouteMap();}}]);
}

// ==================== 深层记忆（全收集后） ====================
function showDeepMemory(){
    hh(); hc(); clr();
    titleOverlay.style.display = 'none';
    apClass('深层记忆', 'artifact-title');
    ad();
    for(var i=0;i<deepMemoryFragments.length;i++){
        apClass('碎片'+(i+1)+'：'+deepMemoryFragments[i], 'fragment-body');
    }
    ad();
    sc([{label:'继续阅读 →',cls:'deep-btn',action:function(){showLetter();}}]);
}

function showLetter(){
    hc(); clr();
    apClass('一封信', 'artifact-title');
    
    // 称呼（不缩进）
    var sal = document.createElement('p');
    sal.textContent = letterSalutation;
    sal.className = 'letter-salutation';
    textArea.appendChild(sal);
    
    // 正文每段首行缩进
    letterBodyParagraphs.forEach(function(para){
        var p = document.createElement('p');
        p.textContent = para;
        p.className = 'letter-body';
        textArea.appendChild(p);
    });
    
    // 署名右对齐
    var sig = document.createElement('p');
    sig.textContent = letterSignature;
    sig.className = 'letter-signature';
    textArea.appendChild(sig);
    
    textArea.scrollTop = textArea.scrollHeight;
    ad();
    sc([{label:'继续阅读 →',cls:'deep-btn',action:function(){showAwakening();}}]);
}

function showAwakening(){
    hc(); clr();
    apClass('觉醒', 'artifact-title');
    apClass(theAwakening, 'awakening');
    ad();
    sc([{label:'← 返回路线图',action:function(){showRouteMap();}}]);
}

function showRouteMap(){
    hh(); hc(); clr();
    titleOverlay.style.display = 'none';
    var text = buildRouteMapText();
    ap(text);
    
    var unlocked = getUnlocked();
    var buttons = [];
    
    unlocked.forEach(function(id){
        buttons.push({
            label: '重读结局：'+routeNames[id]+' → '+routeEnding[id],
            action: function(){ replayEnding(id); }
        });
        buttons.push({
            label: '查看实物：'+artifacts[id].title,
            cls: 'small-btn',
            action: function(){ showArtifact(id); }
        });
    });
    
    if(allUnlocked()){
        buttons.push({
            label: '◆ 深层记忆 ◆',
            cls: 'deep-btn',
            action: function(){ showDeepMemory(); }
        });
    }
    
    buttons.push({label:'← 返回标题',action:function(){restartGame();}});
    sc(buttons);
}

function replayEnding(routeId){
    var branch = routeBranch[routeId];
    clr(); hc(); hh();
    titleOverlay.style.display = 'none';
    playEndingChunk(branch);
    setTimeout(function(){
        hc();
        sc([{label:'← 返回路线图',action:function(){showRouteMap();}}]);
    },1000);
}

// ==================== 游戏流程 ====================
function startGame(){
    titleOverlay.style.opacity='0';
    setTimeout(function(){ titleOverlay.style.display='none'; clr(); playIntro(); },800);
}

function playIntro(){
    playChunk([
        '我永远不会忘记末日开始的那一天。',
        '哥哥满身是血地打开了家门，确认我在家之后，立马回身反锁住了门。',
        '他抱着我，仔仔细细检查了一遍，确定我没受伤，才长出一口气，晕倒在我怀里。',
        '我手忙脚乱地照顾了他三天，期间门外诡异的低吼和时不时传来的尖叫声使我如临大敌。',
        '到底发生了什么？',
        '我不敢开门。',
        '我只能一遍遍用湿毛巾擦拭他滚烫的额头。',
        '所幸，第四天，哥哥最终还是醒了过来。',
        '他握着我的手，苍白虚弱，但神情很认真。',
        '他说，外面已经——',
        '---',
        '三年后。'
    ],function(){ enterDailyScene(); });
}

function enterDailyScene(){
    var ng=isNG?[
        '【仔细想想，这三年来，窗外从来没有下过一滴雨，也没有飞过一只鸟。那片灰蒙蒙的天空，就像是一张永远不会褪色的、死气沉沉的壁纸。】',
        null,

            '我静静地看了一会儿，然后转过身，走到客厅的茶几旁。',
            '我打开急救箱，拿出医用剪刀，又拆开了一卷崭新的纱布，整整齐齐地摆放在桌面上。',
            '也许以后，我会发现更多谎言。',
            '但现在，我不敢睁眼。',
            '我只需要坐在这里，等待日落，等待我的哥哥带着一身"重伤"回来，然后继续这场永远不会结束的包扎游戏。'
        ];
    } else if(branch==='D'){
        chunks=[
            '【结局：镜像】','---',
            '他看着我，我看着他的嘴角沾着我的糖浆。',
            '我终于明白了一件事：这三年，他在等我发现。而我在等的，或许也不是什么真相。',
            '——是时候承认了，我也不是什么正常人。',
            '我看着他眼底那团几乎要将我燃烧殆尽的疯狂，突然觉得这三年的担惊受怕简直是一场无聊的闹剧。',
            '我伸手拽住他的衣领，迫使他低下头，凑到我的唇边。',
            '"哥。"我看着他那双因为兴奋而微微放大的瞳孔，嘴角勾起一抹恶劣的笑意，"既然外面没有丧尸，那我们是不是不用再躲在屋子里了？"',
            '他愣了一下，似乎没跟上我的思路："想出去？"',
            '"不。"我摇了摇头，指尖轻轻划过他平坦的腹部，停在那块被我擦干净的皮肤上。',
            '"我的意思是……既然不用再担心被怪物吃掉，那你是不是可以，毫无顾忌地把我关进你的世界里了？"',
            '哥哥彻底僵住了。',
            '他那张永远运筹帷幄、游刃有余的脸上，第一次出现了明显的错愕和空白。',
            '但仅仅是一瞬，那份错愕就化作了足以吞噬一切的狂热。',
            '"如你所愿，我的小疯子。"',
            '他一把将我抱起，走向了那间永远拉着窗帘的卧室。',
            '在这个虚假的末日里，两个真正的怪物，终于迎来了属于他们的狂欢。'
        ];
    }
    var full='';
    for(var i=0;i<chunks.length;i++){
        if(chunks[i]==='---'){ full+='\n· · ·\n\n'; }
        else { full+=chunks[i]+'\n\n'; }
    }
    var p=document.createElement('p');
    p.textContent=full.trim();
    p.style.whiteSpace='pre-wrap';
    textArea.appendChild(p);
    textArea.scrollTop=textArea.scrollHeight;
    setTimeout(function(){
        ad();
        sc([{label:'重新开始',action:function(){restartGame();}}]);
    },800);
}

function restartGame(){
    hc(); hh(); clr();
    var routes = getUnlocked();
    if(routes.length>0) memoryBtn.style.display='block';
    if(isNG) ngBadge.style.display='block';
    titleOverlay.style.display='flex';
    titleOverlay.style.opacity='1';
}

// ==================== 标题画面事件 ====================
titleOverlay.addEventListener('click', function(e){
    if(e.target === memoryBtn) return;
    startGame();
});
memoryBtn.addEventListener('click', function(e){
    e.stopPropagation();
    showRouteMap();
});

// 初始化
var routes = getUnlocked();
if(routes.length>0) memoryBtn.style.display='block';
if(isNG) ngBadge.style.display='block';
console.log("Slumber's End — Project Somnus");
console.log('《沉眠的终结》完整版已就绪');
console.log('路线图系统：已解锁 '+routes.length+'/6 条路线');
console.log(isNG ? '当前：二周目快速模式' : '当前：一周目逐段模式');
})();
</script>
